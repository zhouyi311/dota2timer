<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota2 Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dota2 Timer</h1>

        

        <div class="section">
            <h3>Lead Time (in seconds)</h3>
            <div class="input-group">
                <label for="leadTime1">1-min interval</label>
                <input type="number" id="leadTime1" min="0" value="15">
            </div>
            <div class="input-group">
                <label for="leadTime2">2-min interval</label>
                <input type="number" id="leadTime2" min="0" value="15">
            </div>
            <div class="input-group">
                <label for="leadTime3">3-min interval</label>
                <input type="number" id="leadTime3" min="0" value="15">
            </div>
            <div class="input-group">
                <label for="leadTime7">7-min interval</label>
                <input type="number" id="leadTime7" min="0" value="25">
            </div>
        </div>

        <div class="section">
            <h3>Voiceover</h3>
            <div class="input-group">
                <label for="toggleJungle">1-min: "Jungle"</label>
                <input type="checkbox" id="toggleJungle" checked>
            </div>
            <div class="input-group">
                <label for="toggleRaverRune">2-min: "Raver Rune"</label>
                <input type="checkbox" id="toggleRaverRune" checked>
            </div>
            <div class="input-group">
                <label for="toggleLotus">3-min: "Lotus"</label>
                <input type="checkbox" id="toggleLotus" checked>
            </div>
            <div class="input-group">
                <label for="toggleExpRune">7-min: "Exp Rune"</label>
                <input type="checkbox" id="toggleExpRune" checked>
            </div>
        </div>
        
        <div class="section">
            <h3>Volume</h3>
            <div class="input-group" id="volume-control">
                <label><input type="radio" name="volume" value="0.2"> 20%</label>
                <label><input type="radio" name="volume" value="0.4"> 40%</label>
                <label><input type="radio" name="volume" value="0.6" checked> 60%</label>
                <label><input type="radio" name="volume" value="0.8"> 80%</label>
                <label><input type="radio" name="volume" value="1.0"> 100%</label>
            </div>
        </div>

        <div class="section">
            <h3>Game Time Calibration</h3>
            <div class="input-group">
                <label for="minutes">Minutes:</label>
                <input type="number" id="minutes" min="0" value="0">
                <label for="seconds" class="seconds-label">Seconds:</label>
                <input type="number" id="seconds" min="0" max="59" value="0">
            </div>
            <button id="setTime">Update Current Time</button>
        </div>

        <div class="section">
            <h3>Current Game Time</h3>
            <div id="time-display-wrapper">
                <button id="adjustTimeMinus" class="time-adjust-btn">-1s</button>
                <p id="currentTime">00:00</p>
                <button id="adjustTimePlus" class="time-adjust-btn">+1s</button>
            </div>
            <button id="startPause">Start</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
